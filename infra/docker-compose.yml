services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    image: chatrium-ai-web:latest
    restart: unless-stopped
    env_file:
      - ../.env
    expose:
      - "3000"
    volumes:
      - app_data:/app/data
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme}
      MYSQL_DATABASE: chatrium_ai
      MYSQL_USER: ${MYSQL_USER:-chatrium_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-changeme}
      TZ: Asia/Bangkok
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"

volumes:
  caddy_data:
  caddy_config:
  mysql_data:
  app_data:
